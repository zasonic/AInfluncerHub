name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AinfluencerHub/AinfluencerHub/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: AinfluencerHub/AinfluencerHub/python/requirements.txt

      - name: Install test dependencies
        # Skip the GPU-heavy wheels — tests here never touch the ML stack.
        run: |
          pip install \
            fastapi uvicorn sse-starlette python-multipart pydantic \
            pytest httpx ruff mypy

      - name: Ruff lint
        working-directory: ${{ github.workspace }}
        run: ruff check AinfluencerHub/AinfluencerHub/python

      - name: Mypy
        working-directory: ${{ github.workspace }}
        run: mypy || true  # non-blocking first pass; tighten once annotations land

      - name: Pytest
        working-directory: ${{ github.workspace }}
        run: pytest -v

  frontend:
    name: Frontend (tsc + eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AinfluencerHub/AinfluencerHub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: AinfluencerHub/AinfluencerHub/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test
